<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slotify - Smart Parking System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        #console { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 5px; margin-top: 20px; min-height: 100px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 Slotify Dashboard</h1>
    
    <div class="grid">
        <div class="card">
            <h3>1. Vehicle Entry (Queue)</h3>
            <input type="text" id="plate" placeholder="Plate Number (e.g., WXA1234)">
            <input type="text" id="name" placeholder="Owner Name">
            <button onclick="arrive()">Register Vehicle at Gate</button>
        </div>

        <div class="card">
            <h3>2. Gate Operations</h3>
            <button class="btn-success" onclick="process()">Process Next & Assign Slot (Min-Heap)</button>
            <button class="btn-danger" onclick="undo()">Undo Last Entry (Stack)</button>
        </div>

        <div class="card">
            <h3>3. Search System</h3>
            <input type="text" id="searchPlate" placeholder="Plate Number to Search">
            <button onclick="searchVehicle()">Search (BST & HashMap)</button>
        </div>

        <div class="card">
            <h3>4. View All Records</h3>
            <button onclick="viewAll()">Display Linked List</button>
        </div>
    </div>

    <h3>System Output:</h3>
    <div id="console">System initialized. Waiting for input...</div>
</div>

<script>
    function logMessage(msg) {
        document.getElementById('console').innerText = msg + '\n' + document.getElementById('console').innerText;
    }

    async function arrive() {
        const plate = document.getElementById('plate').value;
        const name = document.getElementById('name').value;
        if(!plate || !name) return alert("Please fill both fields.");
        
        const res = await fetch(`/api/arrive?plate=${plate}&name=${name}`, { method: 'POST' });
        const data = await res.json();
        logMessage(`[ENTRY] ${data.message}`);
    }

    async function process() {
        const res = await fetch(`/api/process`, { method: 'POST' });
        const data = await res.json();
        logMessage(`[PROCESS] ${data.message}`);
    }

    async function undo() {
        const res = await fetch(`/api/undo`, { method: 'POST' });
        const data = await res.json();
        logMessage(`[UNDO] ${data.message}`);
    }

    async function searchVehicle() {
        const plate = document.getElementById('searchPlate').value;
        const res = await fetch(`/api/search?plate=${plate}`);
        if(res.ok) {
            const text = await res.text();
            if(text) {
                const data = JSON.parse(text);
                logMessage(`[SEARCH] Found: ${data.plateNumber} belonging to ${data.ownerName}`);
            } else {
                logMessage(`[SEARCH] Vehicle ${plate} not found.`);
            }
        }
    }

    async function viewAll() {
        const res = await fetch(`/api/all`);
        const data = await res.json();
        let list = data.map(v => `${v.plateNumber} (${v.ownerName})`).join(', ');
        logMessage(`[LINKED LIST] Records: ${list || 'Empty'}`);
    }
</script>

</body>
</html>
